<html lang="ja">
    <head>
        {% with title='新規辞書作成ページ' %}
            {% include 'head_css.html' %}
        {% endwith %}
    </head>
    <body>
        <a href="/"><i class="fa-solid fa-house"></i>ホーム</a>
        <form action="/create-dictionary" method="post">
            <div class="cover-container">
                <div class="book-cover" id="cover">
                    <input type="hidden" id="cover-color" name="cover-color" value="{{ cover_colors[0] }}">
                    <textarea class="cover-title" id="cover-title" name="cover-title" placeholder="辞書名" autocomplete="off" autofocus required rows="2" maxlength="20"></textarea>
                </div>
                <div class="notice-section">
                    <h2>【新規作成】</h2>
                    <ul>
                        <li>このページでは、辞書の表紙を作成します。</li>
                        <li>辞書名は20文字以内で入力してください。</li>
                        <li>表紙の色は下部から選択してください。</li>
                        <li>辞書名、色ともに後から変更できます。</li>
                        <li>次へボタン押下で単語登録へ進みます。</li>
                    </ul>
                </div>
            </div>
            <div class="color-picker">
                {% for color in cover_colors %}
                    <div class="color-dot" style="background-color: {{ color }}" data-color="{{ color }}"></div>
                {% endfor %}
            </div>
            <button type="submit" >次へ ▶</button>
        </form>
    </body>
</html>

<script>
    const cover = document.getElementById('cover');
    const coverColor = document.getElementById('cover-color');
    const coverTitle = document.getElementById('cover-title');
    const dots = document.querySelectorAll('.color-dot');

    // カラーピッカーの処理
    dots.forEach(dot => {
        dot.addEventListener('click', () => {
            const colorValue = dot.dataset.color || dot.style.backgroundColor;
            cover.style.backgroundColor = colorValue;
            coverColor.value = colorValue;
            dots.forEach(d => d.classList.remove('selected'));
            dot.classList.add('selected');
        });
    });
    // 初期色を設定
    const initialColor = dots[0].dataset.color || dots[0].style.backgroundColor;
    cover.style.backgroundColor = initialColor;
    coverColor.value = initialColor;
    dots[0].classList.add('selected');

    // textareaの高さを自動調整
    function adjustTextareaHeight() {
        coverTitle.style.height = 'auto';
        const scrollHeight = coverTitle.scrollHeight;
        const maxHeight = 80; // max-heightと同じ値
        coverTitle.style.height = Math.min(scrollHeight, maxHeight) + 'px';
    }

    coverTitle.addEventListener('input', adjustTextareaHeight);
    coverTitle.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
        }
    });
</script>
