<html>
    <head>
        {% include 'head_css.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/quiz.css') }}">

    </head>
    <body class="quiz-body">
        {% include 'quiz_header.html' %}
        <div class="quiz-page-title-wrapper">
            <div class="quiz-page-title">
                クイズトップ
            </div>
        </div>
        <div class="quiz-menu-grid">
            <!-- 1列1行目 Choose -->
            <img src="{{ url_for('static', filename='image/Choose.png') }}" class="menu-title-img">
            <!-- 2列1行目 How To-->
            <img src="{{ url_for('static', filename='image/HowTo.png') }}" class="menu-title-img">
            <!-- 1列2行目 問題選択ボックス -->
            <div class="quiz-menu-container box">
                <p>出題範囲</p>
            <div class="dictionary-filter">
                <!-- 上段 -->
                <div class="dictionary-filter-top">
                    <div class="color-filter">
                        <div class="color-dot" data-color="#773333" style="background:#773333;"></div>
                        <div class="color-dot" data-color="#334477" style="background:#334477;"></div>
                        <div class="color-dot" data-color="#335544" style="background:#335544;"></div>
                        <div class="color-dot" data-color="#333333" style="background:#333333;"></div>
                        <div class="color-dot" data-color="#C56700" style="background:#C56700;"></div>
                    </div>
                    <label class="favorite-check">
                        <input type="checkbox" id="favorite-filter">
                        お気に入りのみ
                    </label>
                </div>
                <!-- 下段 -->
                <div class="dictionary-filter-bottom">
                    <div class="select-wrapper">
                        <select id="dictionary-select">
                            <option value="">辞書を選択</option>
                            {% for dictionary in dictionaries %}
                                <option
                                    value="{{ dictionary.id }}"
                                    data-color="{{ dictionary.cover_color }}"
                                    data-favorite="{{ dictionary.is_favorite | lower }}">
                                    {{ dictionary.title }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
                <p>出題形式</p>
                <div class="radio-group">
                    <input type="radio" name="quiz-type" id="quiz-type-description" value="2" checked>
                    <label for="quiz-type-description">記述</label>
                    <input type="radio" name="quiz-type" id="quiz-type-choice" value="1">
                    <label for="quiz-type-choice">択一</label>
                </div>
            </div>
            <!-- 2列2行目 使い方説明ボックス -->
            <div class="quiz-menu-container box">
                <div class="howto">
                    <div class="howto-step">
                        <div class="howto-icon">1</div>
                        <div class="howto-text">出題する辞書を1つ選択</div>
                    </div>
                    <div class="howto-step">
                        <div class="howto-icon">2</div>
                        <div class="howto-text">出題形式（記述／択一）を選択</div>
                    </div>
                    <div class="howto-step">
                        <div class="howto-icon">3</div>
                        <div class="howto-text">PLAYボタンでクイズ開始！</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="quiz-menu-actions">
            <button type="button" id="quiz-play-btn" class="play-btn">PLAY</button>
        </div>
        <script src="{{ url_for('static', filename='js/quiz_menu.js') }}"></script>
    </body>
</html>
