<html>
    <head>
        {% include 'head_css.html' %}
    </head>
    <body>
        <h2>Register</h2>
        <form method="POST" action="./register">
            {{ form.hidden_tag() }}
            <p>
                {{ form.username.label }}<br>
                {{ form.username(size=32) }}<br>
                {{ form.password.label }}<br>
                {{ form.password(size=32) }}<br>
                {{ form.password2.label }}<br>
                {{ form.password2(size=32) }}<br>
                {{ form.submit() }}
            </p>
        </form>
    </body>
</html>
